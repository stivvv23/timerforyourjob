<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Timer 20-20-2</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.container{
  background:#1e293b;
  padding:30px;
  border-radius:15px;
  text-align:center;
  width:300px;
}

h1{ margin-bottom:10px; }

#timer{
  font-size:48px;
  margin:20px 0;
}

input{
  width:70px;
  padding:5px;
  margin:5px;
  border-radius:8px;
  border:none;
  text-align:center;
}

button{
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.controls{
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>Timer</h1>

  <div>
    <label>Kerja (menit)</label><br>
    <input id="work" type="number" value="20">
  </div>

  <div>
    <label>Istirahat (detik)</label><br>
    <input id="rest" type="number" value="20">
  </div>

  <div>
    <label>Break (menit)</label><br>
    <input id="break" type="number" value="2">
  </div>

  <h2 id="phase">Siap</h2>
  <div id="timer">00:00</div>

  <div class="controls">
    <button onclick="start()">Start</button>
    <button onclick="pause()">Pause</button>
    <button onclick="reset()">Reset</button>
  </div>
</div>

<script>
let phases = [];
let current = 0;
let timeLeft = 0;
let interval = null;
let running = false;

function getInput(){
  return [
    { name:"Kerja", time: document.getElementById("work").value * 60 },
    { name:"Istirahat Mata", time: document.getElementById("rest").value },
    { name:"Break", time: document.getElementById("break").value * 60 }
  ];
}

function start(){
  if(!running){
    if(phases.length === 0){
      phases = getInput();
      current = 0;
      timeLeft = phases[0].time;
    }
    running = true;
    interval = setInterval(update,1000);
  }
}

function pause(){
  running = false;
  clearInterval(interval);
}

function reset(){
  running = false;
  clearInterval(interval);
  phases = [];
  current = 0;
  timeLeft = 0;
  document.getElementById("timer").innerText = "00:00";
  document.getElementById("phase").innerText = "Siap";
}

function update(){
  let phase = phases[current];

  document.getElementById("phase").innerText = phase.name;

  let m = Math.floor(timeLeft / 60);
  let s = timeLeft % 60;

  document.getElementById("timer").innerText =
    `${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;

  timeLeft--;

  if(timeLeft < 0){
    current++;
    if(current >= phases.length){
      reset();
      document.getElementById("phase").innerText = "Selesai!";
      return;
    }
    timeLeft = phases[current].time;
  }
}
</script>

</body>
</html>
