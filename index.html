<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer Pro</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f172a;
  font-family:Arial;
  color:white;
}

.container{
  text-align:center;
}

.circle{
  width:220px;
  height:220px;
  border-radius:50%;
  background:conic-gradient(#3b82f6 0deg, #1e293b 0deg);
  display:flex;
  justify-content:center;
  align-items:center;
  margin:auto;
  transition:0.3s;
}

.inner{
  width:180px;
  height:180px;
  background:#0f172a;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#timer{
  font-size:32px;
}

button{
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

input{
  width:60px;
  text-align:center;
  border-radius:6px;
  border:none;
  margin:3px;
}
</style>
</head>

<body>

<div class="container">
  <h2 id="phase">Siap</h2>

  <div class="circle" id="circle">
    <div class="inner">
      <div id="timer">00:00</div>
    </div>
  </div>

  <div style="margin-top:10px;">
    <input id="work" type="number" value="20"> Work
    <input id="rest" type="number" value="20"> Rest
    <input id="break" type="number" value="2"> Break
  </div>

  <div>
    <button onclick="start()">Start</button>
    <button onclick="pause()">Pause</button>
    <button onclick="reset()">Reset</button>
  </div>
</div>

<script>
let phases = [];
let current = 0;
let timeLeft = 0;
let totalTime = 0;
let interval = null;
let running = false;

function getInput(){
  return [
    { name:"Kerja", time: work.value * 60 },
    { name:"Istirahat", time: rest.value },
    { name:"Break", time: break.value * 60 }
  ];
}

function start(){
  if(!running){
    if(phases.length === 0){
      phases = getInput();
      current = 0;
      timeLeft = phases[0].time;
      totalTime = timeLeft;
    }
    running = true;
    interval = setInterval(update,1000);
  }
}

function pause(){
  running = false;
  clearInterval(interval);
}

function reset(){
  running = false;
  clearInterval(interval);
  phases = [];
  current = 0;
  timeLeft = 0;
  document.getElementById("timer").innerText="00:00";
  document.getElementById("phase").innerText="Siap";
  document.getElementById("circle").style.background =
    "conic-gradient(#3b82f6 0deg, #1e293b 0deg)";
}

function update(){
  let phase = phases[current];
  document.getElementById("phase").innerText = phase.name;

  let m = Math.floor(timeLeft/60);
  let s = timeLeft%60;

  document.getElementById("timer").innerText =
    `${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;

  // 🔵 progress circle
  let progress = ((totalTime - timeLeft) / totalTime) * 360;
  document.getElementById("circle").style.background =
    `conic-gradient(#3b82f6 ${progress}deg, #1e293b ${progress}deg)`;

  timeLeft--;

  if(timeLeft < 0){
    current++;
    if(current >= phases.length){
      reset();
      document.getElementById("phase").innerText="Selesai!";
      return;
    }
    timeLeft = phases[current].time;
    totalTime = timeLeft;
  }
}
</script>

</body>
</html>
