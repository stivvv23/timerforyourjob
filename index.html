<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Focus Timer</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  font-family:Arial;
  color:white;
}

.container{
  background:#1e293b;
  padding:30px;
  border-radius:20px;
  text-align:center;
  width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

h2{
  margin-bottom:10px;
  opacity:0.8;
}

.circle{
  width:220px;
  height:220px;
  border-radius:50%;
  margin:20px auto;
  display:flex;
  justify-content:center;
  align-items:center;
  background:conic-gradient(#3b82f6 0deg,#0f172a 0deg);
  transition:0.3s;
}

.inner{
  width:180px;
  height:180px;
  border-radius:50%;
  background:#1e293b;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

#timer{
  font-size:36px;
  font-weight:bold;
}

.inputs{
  margin-top:10px;
}

.inputs input{
  width:60px;
  padding:5px;
  border-radius:8px;
  border:none;
  text-align:center;
  margin:5px;
}

.buttons button{
  margin:5px;
  padding:10px 15px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.start{ background:#3b82f6; color:white; }
.pause{ background:#f59e0b; color:white; }
.reset{ background:#ef4444; color:white; }
</style>
</head>

<body>

<div class="container">
  <h2 id="phase">Siap</h2>

  <div class="circle" id="circle">
    <div class="inner">
      <div id="timer">00:00</div>
    </div>
  </div>

  <div class="inputs">
    <input id="work" type="number" value="20"> Work
    <input id="rest" type="number" value="20"> Rest
    <input id="break Time" type="number" value="2"> Break Time
  </div>

  <div class="buttons">
    <button class="start" onclick="start()">Start</button>
    <button class="pause" onclick="pause()">Pause</button>
    <button class="reset" onclick="reset()">Reset</button>
  </div>
</div>

<script>
let phases = [];
let current = 0;
let timeLeft = 0;
let totalTime = 0;
let interval = null;
let running = false;

function playSound(){
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctx.createOscillator();
  let gain = ctx.createGain();

  osc.connect(gain);
  gain.connect(ctx.destination);

  osc.frequency.value = 700;
  osc.start();

  gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 1);

  setTimeout(()=>{
    osc.stop();
    ctx.close();
  },1000);
}

function getInput(){
  return [
    { name:"Fokus", time: work.value * 60 },
    { name:"Istirahat", time: rest.value },
    { name:"Break", time: breakTime.value * 60 }
  ];
}

function start(){
  if(!running){
    if(phases.length === 0){
      phases = getInput();
      current = 0;
      timeLeft = phases[0].time;
      totalTime = timeLeft;
    }
    running = true;
    interval = setInterval(update,1000);
  }
}

function pause(){
  running = false;
  clearInterval(interval);
}

function reset(){
  running = false;
  clearInterval(interval);
  phases = [];
  current = 0;
  timeLeft = 0;
  document.getElementById("timer").innerText="00:00";
  document.getElementById("phase").innerText="Siap";
  document.getElementById("circle").style.background =
    "conic-gradient(#3b82f6 0deg,#0f172a 0deg)";
}

function update(){
  let phase = phases[current];
  document.getElementById("phase").innerText = phase.name;

  let m = Math.floor(timeLeft/60);
  let s = timeLeft%60;

  document.getElementById("timer").innerText =
    `${m.toString().padStart(2,"0")}:${s.toString().padStart(2,"0")}`;

  let progress = ((totalTime - timeLeft) / totalTime) * 360;
  document.getElementById("circle").style.background =
    `conic-gradient(#3b82f6 ${progress}deg,#0f172a ${progress}deg)`;

  timeLeft--;

  if(timeLeft < 0){
    playSound();
    current++;

    if(current >= phases.length){
      reset();
      document.getElementById("phase").innerText="Selesai!";
      return;
    }

    timeLeft = phases[current].time;
    totalTime = timeLeft;
  }
}
</script>

</body>
</html>
